name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: |
          dotnet publish tik.csproj -c Release -r linux-x64 --self-contained \
            -p:PublishSingleFile=true \
            -o ./publish

      - name: Rename binary
        run: mv ./publish/tik ./publish/tik-linux-x64

      - name: Create release
        run: |
          gh release create "${{ github.ref_name }}" \
            ./publish/tik-linux-x64 \
            --title "${{ github.ref_name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
